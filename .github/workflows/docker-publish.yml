name: Nexus Build and Push to Docker Hub

# Trigger this pipeline every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # The temporary GitHub server

    steps:
    # 1. Pull down your latest code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Log in to Docker Hub using your new secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build and Push Identity API
    - name: Build and Push Identity Image
      uses: docker/build-push-action@v5
      with:
        context: . 
        file: ./Nexus.Identity.API/Dockerfile 
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/identity-api:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/identity-api:latest

    # 4. Build and Push Notification API
    - name: Build and Push Notification Image
      uses: docker/build-push-action@v5
      with:
        context: . 
        file: ./Nexus.Notification.API/Dockerfile 
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/notification-api:${{ github.sha }}  
          ${{ secrets.DOCKER_USERNAME }}/notification-api:latest

    # 5. Log in to Azure using the Service Principal (VIP Badge)
    - name: Log in to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 6. Command Azure to update the Identity API
    - name: Deploy Identity API to Azure
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: nexus-rg
        containerAppName: identity-api
        imageToDeploy: docker.io/${{ secrets.DOCKER_USERNAME }}/identity-api:${{ github.sha }}

    # 7. Command Azure to update the Notification API
    - name: Deploy Notification API to Azure
      uses: azure/container-apps-deploy-action@v1
      with:
        resourceGroup: nexus-rg
        containerAppName: notification-api
        imageToDeploy: docker.io/${{ secrets.DOCKER_USERNAME }}/notification-api:${{ github.sha }}